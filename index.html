<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复古电视模拟器 - RetroTV Simulator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="tv-room">
        <!-- TV Set -->
        <div class="tv-frame">
            <div class="screen-container">
                <div class="screen" id="tvScreen">
                    <!-- Program Content -->
                    <div class="program-display" id="programDisplay">
                        <video id="videoPlayer" muted playsinline></video>
                        <div class="program-card" id="programCard">
                            <canvas class="bg-animation" id="bgCanvas"></canvas>
                            <div class="content">
                                <div class="program-title" id="programTitle">加载中...</div>
                                <div class="program-time" id="programTime"></div>
                                <div class="program-desc" id="programDesc"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Channel Logo -->
                    <div class="channel-logo" id="channelLogo">CCTV-1</div>

                    <!-- Channel OSD -->
                    <div class="channel-osd" id="channelOsd">01</div>

                    <!-- Ad Badge -->
                    <div class="ad-badge" id="adBadge" style="display:none;">广告</div>

                    <!-- Ad Info Overlay (injected by effects.js) -->

                    <!-- Static/Snow -->
                    <div class="static-overlay" id="staticOverlay">
                        <canvas class="static-canvas" id="staticCanvas"></canvas>
                    </div>

                    <!-- Black Screen -->
                    <div class="black-screen" id="blackScreen"></div>

                    <!-- CRT Effects -->
                    <div class="crt-overlay">
                        <div class="scanlines"></div>
                        <div class="vignette"></div>
                        <div class="screen-glare"></div>
                    </div>

                    <!-- Progress Bar -->
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>
            <div class="tv-brand">RETRO TV</div>
            <div class="tv-knobs">
                <div class="knob" title="频道-" onclick="TVApp.prevChannel()"></div>
                <div class="knob" title="频道+" onclick="TVApp.nextChannel()"></div>
            </div>
        </div>

        <!-- Channel Panel -->
        <div class="channel-panel">
            <div class="clock-display" id="clockDisplay">--:--:--</div>
            <div class="panel-title">频 道 列 表</div>
            <ul class="channel-list" id="channelList"></ul>
            <div class="schedule-section">
                <div class="schedule-title">▶ 当前频道节目单</div>
                <div id="scheduleList"></div>
            </div>
            <button class="schedule-btn" onclick="ScheduleView.open()">📺 每周节目单 (G)</button>
            <div class="keyboard-hint">
                <kbd>↑</kbd><kbd>↓</kbd> 切换频道 &nbsp;
                <kbd>1-9</kbd> 快速选台 &nbsp;
                <kbd>G</kbd> 节目单
            </div>
        </div>
    </div>

    <!-- Scripts (order matters) -->
    <script src="js/config.js"></script>
    <script src="js/channels.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/ads.js"></script>
    <script src="js/player.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/schedule-view.js"></script>
    <script src="extensions/loader.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
